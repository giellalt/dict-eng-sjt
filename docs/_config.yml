remote_theme: giellalt/jekyll-theme-giellalt@main
title: Dictionary for English ⇒ Ter Saami
description: An electronic dictionary from English to Ter Saami
plugins:
  - jekyll-remote-theme
  - jekyll-seo-tag
  - jekyll-github-metadata
  - jekyll-include-cache
  - jemoji
  - jekyll-optional-front-matter

defaults:
  - scope: { path: "" }
    values:
      layout: default

markdown: kramdown
kramdown:
  syntax_highlighter_opts:
    disable: true
